    <section id="enquiry" style="padding:50px;background:#fff;">
  <h2 style="text-align:center;">Make an Enquiry</h2>
  <form id="enquiry-form" action="https://formspree.io/f/your-form-id" method="POST" style="max-width:500px;margin:auto;display:flex;flex-direction:column;gap:15px;">
    <input type="text" name="name" placeholder="Your Name" required style="padding:10px;border-radius:8px;border:1px solid #ccc;" />
    <input type="email" name="email" placeholder="Your Email" required style="padding:10px;border-radius:8px;border:1px solid #ccc;" />
    <textarea na="message" placeholder="Your Message" required style="padding:10px;border-radius:8px;border:1px solid #ccc;"></textarea>
    <button type="submit" class="btn">Send Enquiry (Email)</button>
    <button type="button" class="btn" onclick="sendEnquiry()">Send via WhatsApp</button>

<script>
function sendEnquiry(){
  let name=document.querySelector('input[name=name]').value;
  let email=document.querySelector('input[name=email]').value;
  let message=document.querySelector('textarea[name=message]').value;

  let text=`Hello AZIFEME,%0AName: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
  window.open('https://wa.me/233559538947?text='+text,'_blank');
}

// Handle Formspree submission without leaving page
const form = document.getElementById('enquiry-form');
if(form){
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const data = new FormData(form);
    const response = await fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    const status = document.getElementById('form-status');
    if(response.ok){
      status.innerText = "Enquiry sent successfully!";
      form.reset();
    } else {
      status.innerText = "Oops! Something went wrong.";
    }
  });
}

</script>
